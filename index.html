<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pallet Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="pageLayout">
      <aside id="sidebar">
        <form
          id="controls"
          onsubmit="
            fillPalActive();
            return false;
          ">
          <div class="form-row">
            <label for="palSize">Pallet Size</label>
            <select id="palSize" onchange="updateCanvasSize()">
              <option value="1200x800">1200 × 800 mm</option>
              <option value="1000x1000">1000 × 1000 mm</option>
              <option value="1200x1000">1200 × 1000 mm</option>
              <option value="1200x1200">1200 × 1200 mm</option>
            </select>

            <!-- hidden checkbox kept for compatibility com o JS existente -->
            <input type="checkbox" id="allowExceed" style="display: none" />
          </div>

          <div class="form-row">
            <label for="shape">Reel Orientation</label>
            <select id="shape" onchange="toggleCylinderInputs()">
              <option value="circle">Vertical (standing)</option>
              <option value="cylinder">Horizontal (lying)</option>
            </select>
          </div>

          <div id="circleInputs" class="form-row">
            <label for="diameter">Diameter (mm)</label>
            <input type="number" id="diameter" min="1" value="400" />
          </div>

          <div id="cylinderInputs" style="display: none">
            <div class="form-row">
              <label for="cylWidth">Width (mm)</label>
              <input type="number" id="cylWidth" min="1" value="600" />
            </div>
            <div class="form-row">
              <label for="cylHeight">Diameter (mm)</label>
              <input type="number" id="cylHeight" min="1" value="800" />
            </div>
          </div>

          <div class="form-row">
            <label for="mandrilD">Mandril Ø (mm)</label>
            <select id="mandrilD">
              <option value="76">76 mm</option>
              <option value="152">152 mm</option>
            </select>
          </div>
        </form>

        <div id="controlButtons">
          <button type="button" onclick="fillPalActive()">Fill Pallet</button>
          <button id="exceedToggle" type="button" onclick="toggleExceed()">Exceeds Pallet</button>
          <button id="linearToggle" type="button" class="active" onclick="toggleLinearDisposition()">Linear Disposition</button>
          <div id="sidebarFooter">
            <button type="button" id="downloadImageBtn" onclick="downloadCanvas()">Download Image</button>
          </div>
        </div>
      </aside>

      <main id="preview">
        <div id="previewHeader">
          <p><strong>Reels in Pallet:</strong> <span id="bobCount">0</span></p>
        </div>

        <div id="canvasContainer">
          <div class="canvas-wrapper">
            <canvas id="palCanvas" width="1200" height="800"></canvas>
            <div id="widthMeasure"></div>
            <div id="heightMeasure"></div>
          </div>
        </div>
      </main>
    </div>

    <script src="script.js"></script>
    <script src="script_hex.js"></script>
    <script>
      // estado global: true = usar linear (script.js), false = usar hex (script_hex.js)
      window.linearDisposition = true;

      function toggleLinearDisposition() {
        window.linearDisposition = !window.linearDisposition;
        const btn = document.getElementById('linearToggle');
        if (window.linearDisposition) {
          btn.classList.add('active');
          btn.textContent = 'Linear Disposition';
        } else {
          btn.classList.remove('active');
          btn.textContent = 'Hexagonal Disposition';
        }
        // redesenha imediatamente usando o modo activo (mantém os inputs)
        fillPalActive();
      }

      // alterna o estado "Exceeds Pallet" (usa o hidden checkbox para compatibilidade)
      function toggleExceed() {
        const hidden = document.getElementById('allowExceed');
        const btn = document.getElementById('exceedToggle');
        hidden.checked = !hidden.checked;
        if (hidden.checked) {
          btn.classList.add('active');
          btn.textContent = 'Exceeds Pallet ✓';
        } else {
          btn.classList.remove('active');
          btn.textContent = 'Exceeds Pallet';
        }
        // redesenha com o novo estado
        fillPalActive();
      }

      document.addEventListener('DOMContentLoaded', function () {
        // submete ao pressionar Enter em qualquer input numérico
        document.querySelectorAll('input[type="number"]').forEach(function (input) {
          input.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
              e.preventDefault();
              fillPalActive();
            }
          });
        });

        // reposiciona as medidas da palete sempre que o canvas muda de tamanho visual
        const canvas = document.getElementById('palCanvas');
        if (canvas && typeof drawPaletMeasurements === 'function') {
          const ro = new ResizeObserver(function () {
            const ctx = canvas.getContext('2d');
            drawPaletMeasurements(canvas, ctx);
          });
          ro.observe(canvas);
        }
      });

      // wrapper que chama a implementação activa
      function fillPalActive() {
        if (window.linearDisposition) {
          if (typeof fillPal === 'function') return fillPal();
        } else {
          if (typeof fillPalHex === 'function') return fillPalHex();
        }
        // fallback
        if (typeof fillPal === 'function') return fillPal();
      }
    </script>
  </body>
</html>
